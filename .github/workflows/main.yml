name: ci

on:
  push:
    branches:
      - "master"
    tags:
      - '*.*.*'
    paths-ignore:
      - 'index.yaml'
      - '*.tgz'

permissions:
  contents: write

jobs:
  helm-release:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    name: helm-package-and-index
    steps:
      - name: Checkout master
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: master
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set release version env
        run: echo "RELEASE_VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Install Helm
        uses: azure/setup-helm@v5
        with:
          version: v3.15.3

      - name: Configure git author
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Helm package
        run: |
          helm package active-mq -d .

      - name: Helm repo index (merge)
        run: |
          helm repo index . \
            --merge index.yaml \
            --url https://raw.githubusercontent.com/antiantiops/activemq-helm-chart/master

      - name: Commit and push chart artifacts
        run: |
          git add index.yaml active-mq-*.tgz
          if git diff --cached --quiet; then
            echo "Nothing to commit"
            exit 0
          fi
          git commit -m "chore(helm): release chart for ${RELEASE_VERSION} [skip ci]"
          git push origin HEAD:master
